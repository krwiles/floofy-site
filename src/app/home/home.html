<!-- Hero section: tall container creates scroll distance while background stays mostly still. -->
<section
    class="bg-fixed relative isolate min-h-[150vh] overflow-hidden bg-[url('/G8s5y4ZakAA0XN9.jpeg')] bg-cover bg-no-repeat bg-position-[center_40%]"
    aria-label="Hero section"
>
    <!-- Horizontal dark gradient overlay: improves contrast for right-aligned white text. -->
    <div class="absolute inset-0 bg-linear-to-r from-black/0 via-black/0 to-black/40" aria-hidden="true"></div>

    <!-- Foreground content: this scrolls normally while the background remains visually slower. -->
    <div class="relative z-10 mx-auto flex min-h-[calc(100svh-5rem)] w-full max-w-300 items-center justify-end px-6 text-right text-white lg:min-h-[calc(100svh-6rem)] lg:px-16">
        <div class="drop-shadow-[0_4px_14px_rgba(0,0,0,0.7)]">
            <!-- Small intro/kicker text above the main title. -->
            <p class="m-0 uppercase tracking-[0.12em] opacity-90">Illustrator and Streamer</p>
            <!-- Main hero heading. -->
            <h1 class="mt-[0.35rem] mb-0 text-[9rem] leading-[0.95] font-extrabold">Floofy</h1>
            <!-- Supporting hero description text. -->
            <p class="mt-4 mb-0 max-w-[30ch] text-[1.5em] leading-[1.6] opacity-95">Comfy art, bold character designs, and cozy streams.</p>
        </div>
    </div>

    <!-- Spacer extends the section so scrolling reveals the parallax separation effect. -->
    <div class="h-[80vh]" aria-hidden="true"></div>
</section>
